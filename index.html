<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybrid Attendance Tracker</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div id="app">
    <header class="cal-nav">
      <button id="btn-prev" aria-label="Previous month">&#9664;</button>
      <h1 id="cal-title"></h1>
      <button id="btn-next" aria-label="Next month">&#9654;</button>
    </header>

    <div class="cal-headers">
      <div class="cal-header-cell">Sun</div>
      <div class="cal-header-cell">Mon</div>
      <div class="cal-header-cell">Tue</div>
      <div class="cal-header-cell">Wed</div>
      <div class="cal-header-cell">Thu</div>
      <div class="cal-header-cell">Fri</div>
      <div class="cal-header-cell">Sat</div>
    </div>

    <div id="cal-grid" class="cal-grid"></div>

    <div class="brush-bar" id="brush-bar">
      <button class="brush-btn brush-btn--active" data-brush="in-office">
        <span class="brush-swatch" data-status="in-office"></span>In Office
      </button>
      <button class="brush-btn" data-brush="at-home">
        <span class="brush-swatch" data-status="at-home"></span>At Home
      </button>
      <button class="brush-btn" data-brush="time-off">
        <span class="brush-swatch" data-status="time-off"></span>Time Off
      </button>
      <button class="brush-btn" data-brush="wfa">
        <span class="brush-swatch" data-status="wfa"></span>WFA
      </button>
    </div>

    <section id="stats" aria-label="Attendance statistics">
      <p id="stats-average" class="stats-average"></p>
      <p id="stats-totals" class="stats-totals"></p>
    </section>

    <div class="cal-preferences">
      <label for="toggle-weekends">
        <input type="checkbox" id="toggle-weekends">
        Include weekends
      </label>
    </div>
  </div>

  <script type="module" src="src/app.js?v=2"></script>
</body>
</html>
